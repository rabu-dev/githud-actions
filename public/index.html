<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Proyecto de aprendizaje de GitHub Actions con Python — CI/CD, testing con pytest y deploy automático.">
  <title>githud-actions — GitHub Actions Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(56, 139, 253, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(163, 113, 247, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(46, 160, 67, 0.08) 0%, transparent 50%);
      z-index: 0;
      animation: pulse 8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.2s forwards;
    }

    .badge img {
      border-radius: 6px;
      transition: transform 0.2s ease;
    }

    .badge img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #58a6ff, #a371f7, #3fb950);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.4s forwards;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.6s forwards;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.8s forwards;
    }

    .card {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(48, 54, 61, 0.6);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(56, 139, 253, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #8b949e;
      line-height: 1.4;
    }

    .footer {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 1s forwards;
    }

    .footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border: 1px solid rgba(56, 139, 253, 0.3);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .footer a:hover {
      background: rgba(56, 139, 253, 0.1);
      border-color: rgba(56, 139, 253, 0.6);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      <a href="https://github.com/rabu-dev/githud-actions/actions/workflows/ci.yml">
        <img src="https://github.com/rabu-dev/githud-actions/actions/workflows/ci.yml/badge.svg" alt="CI Status">
      </a>
    </div>
    <h1>githud-actions</h1>
    <p class="subtitle">Aprendiendo GitHub Actions con Python 🐍</p>
    <div class="cards">
      <div class="card">
        <div class="card-icon">🧪</div>
        <div class="card-title">Tests</div>
        <div class="card-desc">pytest en matrix de Python 3.10 → 3.14</div>
      </div>
      <div class="card">
        <div class="card-icon">🔍</div>
        <div class="card-title">Linter</div>
        <div class="card-desc">Ruff para análisis estático del código</div>
      </div>
      <div class="card">
        <div class="card-icon">🚀</div>
        <div class="card-title">Deploy</div>
        <div class="card-desc">Auto-deploy a GitHub Pages en master</div>
      </div>
    </div>
    <div class="footer">
      <a href="https://github.com/rabu-dev/githud-actions">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        Ver repositorio
      </a>
    </div>
  </div>
</body>
</html>
